version: "3.9"

services:
  mcp-nexus:
    build: .
    container_name: mcp-nexus
    restart: unless-stopped
    ports:
      - "8766:8766"
    env_file:
      - .env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - mcp-nexus-data:/home/nexus/.mcp-nexus
    healthcheck:
      test: ["CMD", "python", "-m", "mcp_nexus", "health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  mcp-nexus-data:
